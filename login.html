<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NasTech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 32px;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { color: #8B2E2E; font-size: 1.8rem; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
        }
        button {
            background: #8B2E2E;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #6b2323; }
        .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 10px; margin-top: 16px; font-size: 0.8rem; }
        .success { color: #16a34a; background: #dcfce7; padding: 10px; border-radius: 10px; margin-top: 16px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin Login</h1>
        <p>Enter your credentials</p>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login →</button>
        <div id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient(
            'https://tejpkjimizzbhylwzldm.supabase.co',
            'sb_publishable_c_eyzM8vbpkZB41rDouMyQ_vIEQox3v'
        );

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            
            if (!email || !password) {
                msgDiv.innerHTML = '<div class="error">❌ Enter email and password</div>';
                return;
            }
            
            msgDiv.innerHTML = '<div class="success">⏳ Logging in...</div>';
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                msgDiv.innerHTML = '<div class="error">❌ Invalid email or password</div>';
                return;
            }
            
            window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
