<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin - Verify Payments | NasTech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-dashboard {
            width: 100%;
        }

        .container {
            max-width: 100%;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: #8B2E2E;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            max-width: 160px;
        }

        .stats {
            background: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            border: 1px solid #eee;
        }

        .stats span {
            color: #8B2E2E;
            font-weight: bold;
            font-size: 1rem;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            background: white;
            margin-top: 16px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 800px;
        }

        .orders-table th, .orders-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .orders-table th {
            background: #f8f8f8;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .accept-btn {
            background: #8B2E2E;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 5px;
        }

        .reject-btn {
            background: #dc2626;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }

        .delivery-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .delivery-pickup { background: #3b82f6; color: white; }
        .delivery-within { background: #22c55e; color: white; }
        .delivery-interstate { background: #f97316; color: white; }

        .status-pending-payment { color: #eab308; font-weight: 600; }
        .status-pending-verification { color: #f97316; font-weight: 600; }
        .status-completed { color: #22c55e; font-weight: 600; }
        .status-rejected { color: #dc2626; font-weight: 600; }

        .no-orders {
            text-align: center;
            padding: 40px;
            color: #888;
            background: white;
            border-radius: 16px;
            font-size: 0.85rem;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        @media (min-width: 768px) {
            .admin-dashboard { padding: 30px; }
            .header { flex-direction: row; justify-content: space-between; align-items: center; }
            .orders-table { font-size: 0.8rem; min-width: auto; }
            .orders-table th, .orders-table td { padding: 12px; }
        }
    </style>
</head>
<body>

    <!-- Admin Dashboard -->
    <div class="admin-dashboard" id="adminDashboard">
        <div class="container">
            <div class="header">
                <div>
                    <h1>Payment Dashboard</h1>
                    <p style="color: #666; font-size: 0.8rem;">Manage & verify orders</p>
                </div>
                <div class="stats">
                    📊 Total: <span id="orderCount">0</span>
                </div>
            </div>
            
            <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh Orders</button>
            <button class="refresh-btn" style="background:#666; margin-left:10px;" onclick="logout()">🚪 Logout</button>
            
            <div id="ordersTable">
                <div class="no-orders">Loading orders...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // ============ SUPABASE CONFIG ============
        const SUPABASE_URL = 'https://tejpkjimizzbhylwzldm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_c_eyzM8vbpkZB41rDouMyQ_vIEQox3v';  // ← Replace with your real anon key
        const EMAILJS_SERVICE_ID = 'service_wrdt5bi';
        const EMAILJS_TEMPLATE_CUSTOMER = 'template_wqlx72m';
        const EMAILJS_PUBLIC_KEY = 'jw2pFeW1Jg6MySOyb';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        emailjs.init(EMAILJS_PUBLIC_KEY);
        
        // Check authentication
        async function checkAuth() {
            const { data, error } = await supabaseClient.auth.getUser();
            if (error || !data.user) {
                window.location.href = 'login.html';
            }
        }
        
        // Logout function
        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }
        
        async function sendCustomerEmail(orderNumber, customerName, customerAddress, customerEmail, productName, total, deliveryType) {
            let deliveryText = deliveryType === 'pickup' ? 'Pick up at our office' : deliveryType === 'within_state' ? 'Within Lagos Delivery' : 'Interstate Delivery';
            return await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_CUSTOMER, {
                order_id: orderNumber, customer_name: customerName, customer_address: customerAddress,
                customer_email: customerEmail, product_name: productName, total: total,
                delivery_type: deliveryText, order_date: new Date().toLocaleDateString('en-NG')
            });
        }

        async function loadOrders() {
            const { data: orders, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
            if (error) { document.getElementById('ordersTable').innerHTML = '<div class="no-orders">❌ Error</div>'; return; }
            if (!orders || orders.length === 0) { document.getElementById('ordersTable').innerHTML = '<div class="no-orders">📭 No orders yet</div>'; document.getElementById('orderCount').innerHTML = '0'; return; }
            
            const pendingCount = orders.filter(o => o.status === 'pending_verification').length;
            document.getElementById('orderCount').innerHTML = `${orders.length} ${pendingCount > 0 ? `(${pendingCount} pending)` : ''}`;
            
            let html = `<div class="table-wrapper"><table class="orders-table"><thead><tr>
                <th>Order #</th><th>Date</th><th>Total</th><th>Items</th><th>Customer</th><th>Phone</th><th>Email</th><th>Delivery</th><th>Address</th><th>Status</th><th>Action</th>
            </tr></thead><tbody>`;
            
            for (const o of orders) {
                let deliveryBadge = o.delivery_type === 'pickup' ? '<span class="delivery-badge delivery-pickup">🏢 Pickup</span>' : o.delivery_type === 'within_state' ? '<span class="delivery-badge delivery-within">🚐 Within</span>' : o.delivery_type === 'interstate' ? '<span class="delivery-badge delivery-interstate">🚛 Interstate</span>' : '-';
                
                let statusText = '', statusClass = '', actionButton = '';
                if (o.status === 'pending_payment') { statusText = 'Awaiting Payment'; statusClass = 'status-pending-payment'; actionButton = '<span style="color:#888;">Waiting</span>'; }
                else if (o.status === 'pending_verification') {
                    statusText = 'Pending Verification'; statusClass = 'status-pending-verification';
                    let productName = 'Generator';
                    try { const items = JSON.parse(o.items); if (items.length) productName = items[0].name; } catch(e) {}
                    actionButton = `<div class="action-buttons">
                        <button class="accept-btn" onclick="verifyOrder('${o.order_number.replace(/'/g, "\\'")}', '${(o.customer_name || '').replace(/'/g, "\\'")}', '${(o.customer_address || '').replace(/'/g, "\\'")}', '${(o.customer_email || '').replace(/'/g, "\\'")}', '${productName.replace(/'/g, "\\'")}', ${o.total || 0}, '${(o.delivery_type || '').replace(/'/g, "\\'")}')">✅ Accept</button>
                        <button class="reject-btn" onclick="rejectOrder('${o.order_number.replace(/'/g, "\\'")}', '${(o.customer_email || '').replace(/'/g, "\\'")}')">❌ Reject</button>
                    </div>`;
                }
                else if (o.status === 'completed') { statusText = 'Completed'; statusClass = 'status-completed'; actionButton = '<span style="color:#22c55e;">✓ Done</span>'; }
                else if (o.status === 'rejected') { statusText = 'Rejected'; statusClass = 'status-rejected'; actionButton = '<span style="color:#dc2626;">✗ Rejected</span>'; }
                else { statusText = o.status; actionButton = '-'; }
                
                let itemsText = '-';
                try { const items = JSON.parse(o.items); itemsText = items.map(i => i.name).join('<br>'); } catch(e) {}
                const date = o.created_at ? new Date(o.created_at).toLocaleDateString() : '-';
                
                html += `<tr>
                    <td><strong>${o.order_number}</strong></td><td>${date}</td><td>₦${(o.total || 0).toLocaleString()}</td>
                    <td style="max-width:180px">${itemsText}</td><td><strong>${o.customer_name || '-'}</strong></td>
                    <td>${o.customer_phone || '-'}</td><td>${o.customer_email || '-'}</td>
                    <td style="text-align:center">${deliveryBadge}</td><td style="max-width:200px">${o.customer_address || '-'}</td>
                    <td class="${statusClass}">${statusText}</td><td>${actionButton}</td>
                </tr>`;
            }
            html += `</tbody></table></div>`;
            document.getElementById('ordersTable').innerHTML = html;
        }
        
        async function verifyOrder(orderNumber, customerName, customerAddress, customerEmail, productName, total, deliveryType) {
            const { error } = await supabaseClient.from('orders').update({ status: 'completed' }).eq('order_number', orderNumber);
            if (error) { alert('Error: ' + error.message); return; }
            if (customerEmail && customerEmail !== '-' && customerEmail !== 'null') await sendCustomerEmail(orderNumber, customerName, customerAddress, customerEmail, productName, total, deliveryType);
            alert('✅ Order verified!');
            loadOrders();
        }

        async function rejectOrder(orderNumber, customerEmail) {
            if (!confirm(`Reject order ${orderNumber}?`)) return;
            const { error } = await supabaseClient.from('orders').update({ status: 'rejected' }).eq('order_number', orderNumber);
            if (error) alert('Error: ' + error.message);
            else { alert('Order rejected'); loadOrders(); }
        }
        
        async function initAdmin() {
            await checkAuth();
            loadOrders();
            setInterval(loadOrders, 15000);
        }
        
        // Start the admin panel
        initAdmin();
    </script>
</body>
</html>
